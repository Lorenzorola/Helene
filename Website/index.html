<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FocusBook</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<header>
		<canvas id="headerSpace"></canvas>
		<img
			src="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/F37VZzDljD/wxajdiao_expires_30_days.png"
			alt="FocusBook Logo"
			class="logo"
		/>
		<div class="nav-container">
			<button class="menu-toggle" id="menuToggle">☰</button>
			<nav id="menu">
				<a href="#home">Home</a>
				<a href="#products">Products</a>
				<a href="#store">Store</a>
				<a href="#support">Support</a>
				<a href="#contacts">Contacts</a>
			</nav>
		</div>
	</header>

	<main>
		<h1 class="hero-title">FocusBook</h1>
		<h2 class="hero-subtitle">Be Hélene, Be Smart.</h2>
	</main>

	<script>
		const menuToggle = document.getElementById('menuToggle');
		const menu = document.getElementById('menu');

		menuToggle.addEventListener('click', () => {
			menu.classList.toggle('active');
		});

		const navLinks = menu.querySelectorAll('a');
		navLinks.forEach(link => {
			link.addEventListener('click', () => {
				menu.classList.remove('active');
			});
		});

		document.addEventListener('click', (e) => {
			if (!e.target.closest('header')) {
				menu.classList.remove('active');
			}
		});

		const headerCanvas = document.getElementById('headerSpace');
		const headerCtx = headerCanvas.getContext('2d');

		function resizeHeaderCanvas() {
			headerCanvas.width = headerCanvas.offsetWidth;
			headerCanvas.height = headerCanvas.offsetHeight;
		}

		const stars = [];
		const shootingStars = [];
		let lastShootingStarTime = 0;
		const shootingStarInterval = 6000;

		function createStars() {
			stars.length = 0;
			const count = Math.max(150, Math.floor(headerCanvas.width / 6));
			for (let i = 0; i < count; i++) {
				const isLargeStar = Math.random() < 0.15;
				const size = isLargeStar ? Math.random() * 2 + 1.5 : Math.random() * 0.8 + 0.2;
				
				stars.push({
					x: Math.random() * headerCanvas.width,
					y: Math.random() * headerCanvas.height,
					size: size,
					isLargeStar: isLargeStar,
					brightness: Math.random() * 0.5 + 0.5,
					twinkleSpeed: Math.random() * 0.16 + 0.06,
					twinklePhase: Math.random() * Math.PI * 2
				});
			}
		}

		function createShootingStar() {
			const spawnSide = Math.floor(Math.random() * 4);
			let startX;
			let startY;
			let targetX;
			let targetY;

			if (spawnSide === 0) {
				startX = -90;
				startY = Math.random() * headerCanvas.height;
				targetX = headerCanvas.width + 90;
				targetY = Math.random() * headerCanvas.height;
			} else if (spawnSide === 1) {
				startX = headerCanvas.width + 90;
				startY = Math.random() * headerCanvas.height;
				targetX = -90;
				targetY = Math.random() * headerCanvas.height;
			} else if (spawnSide === 2) {
				startX = Math.random() * headerCanvas.width;
				startY = -90;
				targetX = Math.random() * headerCanvas.width;
				targetY = headerCanvas.height + 90;
			} else {
				startX = Math.random() * headerCanvas.width;
				startY = headerCanvas.height + 90;
				targetX = Math.random() * headerCanvas.width;
				targetY = -90;
			}

			const deltaX = targetX - startX;
			const deltaY = targetY - startY;
			const distance = Math.hypot(deltaX, deltaY);

			shootingStars.push({
				x: startX,
				y: startY,
				length: Math.random() * 70 + 95,
				speed: Math.random() * 6 + 8,
				directionX: deltaX / distance,
				directionY: deltaY / distance,
				opacity: 1,
				life: 0,
				maxLife: 95
			});
		}

		function drawFourPointStar(ctx, x, y, size) {
			const points = 4;
			const outerRadius = size;
			const innerRadius = size * 0.4;

			ctx.beginPath();
			for (let i = 0; i < points * 2; i++) {
				const radius = i % 2 === 0 ? outerRadius : innerRadius;
				const angle = (i * Math.PI) / points - Math.PI / 2;
				const px = x + Math.cos(angle) * radius;
				const py = y + Math.sin(angle) * radius;

				if (i === 0) {
					ctx.moveTo(px, py);
				} else {
					ctx.lineTo(px, py);
				}
			}
			ctx.closePath();
		}

		function animateHeaderStars(timestamp = 0) {
			headerCtx.clearRect(0, 0, headerCanvas.width, headerCanvas.height);

			stars.forEach((star) => {
				star.twinklePhase += star.twinkleSpeed;
				const twinkle = Math.sin(star.twinklePhase);
				const opacity = 0.1 + (twinkle + 1) * 0.45;

				if (star.isLargeStar) {
					const grad = headerCtx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.size * 3);
					grad.addColorStop(0, `rgba(255,255,255,${opacity})`);
					grad.addColorStop(0.3, `rgba(200,220,255,${opacity * 0.8})`);
					grad.addColorStop(1, `rgba(150,180,255,${opacity * 0.2})`);

					headerCtx.fillStyle = grad;
					headerCtx.shadowColor = `rgba(180,210,255,${opacity * 0.8})`;
					headerCtx.shadowBlur = star.size * 5;

					drawFourPointStar(headerCtx, star.x, star.y, star.size);
					headerCtx.fill();

					headerCtx.fillStyle = `rgba(255,255,255,${opacity})`;
					headerCtx.beginPath();
					headerCtx.arc(star.x, star.y, star.size * 0.2, 0, Math.PI * 2);
					headerCtx.fill();
				} else {
					const grad = headerCtx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.size * 3);
					grad.addColorStop(0, `rgba(255,255,255,${opacity})`);
					grad.addColorStop(0.4, `rgba(220,240,255,${opacity * 0.6})`);
					grad.addColorStop(1, `rgba(100,180,255,${opacity * 0.2})`);

					headerCtx.fillStyle = grad;
					headerCtx.shadowColor = `rgba(150,200,255,${opacity * 0.8})`;
					headerCtx.shadowBlur = star.size * 4;

					headerCtx.beginPath();
					headerCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
					headerCtx.fill();
				}

				headerCtx.shadowBlur = 0;
			});

			if (timestamp - lastShootingStarTime >= shootingStarInterval) {
				createShootingStar();
				lastShootingStarTime = timestamp;
			}

			for (let i = shootingStars.length - 1; i >= 0; i--) {
				const s = shootingStars[i];
				s.life++;
				s.x += s.directionX * s.speed;
				s.y += s.directionY * s.speed;
				s.opacity = Math.max(0, 1 - s.life / s.maxLife);

				const tailX = s.x - s.directionX * s.length;
				const tailY = s.y - s.directionY * s.length;
				const gradient = headerCtx.createLinearGradient(tailX, tailY, s.x, s.y);

				gradient.addColorStop(0, 'rgba(255,255,255,0)');
				gradient.addColorStop(0.45, `rgba(180,200,255,${s.opacity * 0.35})`);
				gradient.addColorStop(1, `rgba(255,255,255,${s.opacity})`);

				headerCtx.save();
				headerCtx.strokeStyle = gradient;
				headerCtx.lineWidth = 2;
				headerCtx.shadowColor = `rgba(220,230,255,${s.opacity})`;
				headerCtx.shadowBlur = 14;
				headerCtx.beginPath();
				headerCtx.moveTo(tailX, tailY);
				headerCtx.lineTo(s.x, s.y);
				headerCtx.stroke();

				headerCtx.fillStyle = `rgba(255,255,255,${s.opacity})`;
				headerCtx.beginPath();
				headerCtx.arc(s.x, s.y, 2.2, 0, Math.PI * 2);
				headerCtx.fill();
				headerCtx.restore();

				if (s.opacity <= 0 || s.x < -s.length || s.x > headerCanvas.width + s.length || s.y < -s.length || s.y > headerCanvas.height + s.length) {
					shootingStars.splice(i, 1);
				}
			}

			requestAnimationFrame(animateHeaderStars);
		}

		function initHeaderAnimation() {
			resizeHeaderCanvas();
			createStars();
			animateHeaderStars();
		}

		window.addEventListener('resize', () => {
			resizeHeaderCanvas();
			createStars();
		});

		initHeaderAnimation();
	</script>
</body>
</html>
