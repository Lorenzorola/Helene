<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FocusBook</title>
	<link rel="stylesheet" href="styles.css">
	<script src="js/starfield.js"></script>
	<script src="js/animations.js"></script>
</head>
<body>
	<header>
		<canvas id="headerSpace"></canvas>
		<img
			src="assets/Logo.svg"
			alt="FocusBook Logo"
			class="logo"
		/>
		<div class="nav-container">
			<button class="menu-toggle" id="menuToggle">☰</button>
			<nav id="menu">
				<a href="#home">Home</a>
				<a href="#products">Products</a>
				<a href="#store">Store</a>
				<a href="#support">Support</a>
				<a href="#contacts">Contacts</a>
			</nav>
		</div>
		<div class="cart-icon">
			<img src="assets/cart.png" alt="base cart" class="base">
			<img src="assets/cart-hover.png" alt="hover cart" class="hover">
		</div>
	</header>

	<main>
		
		<p class="hero-title">FocusBook</p>
		<h2 class="hero-subtitle">La soluzione definitiva per l’Education</h2>
		<div class="hero-buttons">
			<a href="#products" class="hero-btn-fill">Scopri di più</a>
			<a href="#store" class="hero-btn-empty">Acquista</a>
		</div>
		<img src="assets/FocusBook index VFX.png" alt="FocusBook Hero Image" class="hero-image" />
	</main>
	<black-section>
		<h2 class="black-title">Scopri gli <span class="highlight-accent">accessori</span>...</h2>
	</black-section>
</body>
</html>
