<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Helene Website</title>
	<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Lexend', sans-serif;
			background: #EBEDFF;
			color: #333;
		}

		header {
			background: #ADA7DA;
			padding: 40px 20px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
		}

		.logo {
			width: 165px;
			height: 105px;
			background: #EBEDFF;
			border-radius: 8px;
		}

		nav {
			display: flex;
			gap: 40px;
			list-style: none;
		}

		nav a {
			color: #EBEDFF;
			text-decoration: none;
			font-size: 25px;
			font-weight: 600;
			transition: opacity 0.3s ease;
		}

		nav a:hover {
			opacity: 0.8;
		}

		main {
			padding: 60px 20px;
			max-width: 1200px;
			margin: 0 auto;
		}
	</style>
</head>
<body>
	<header>
		<div class="logo"></div>
		<nav>
			<a href="#home">Home</a>
			<a href="#products">Products</a>
			<a href="#store">Store</a>
			<a href="#support">Support</a>
			<a href="#contacts">Contacts</a>
		</nav>
	</header>

	<main>
		<!-- Main content goes here -->
	</main>
</body>
</html>
